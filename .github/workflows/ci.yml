name: CI / Publish

permissions:
  contents: write
  checks: write
  pull-requests: write
  packages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    name: CI/CD
    uses: GravionLabs/ci/.github/workflows/angular-package.yml@main
    with:
      node-version: '24'
      package-manager: pnpm
      build-command: pnpm run build:lib
      run-tests: false
      publish-directory: ./dist/helix
    secrets:
      npm-token: ${{ secrets.GITHUB_TOKEN }}
