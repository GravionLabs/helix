name: CI / Publish

permissions:
  contents: write
  checks: write
  pull-requests: write
  packages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quick-check:
    name: Quick Check (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec ng build helix-demo --configuration development

  package:
    name: CI/CD
    uses: GravionLabs/ci/.github/workflows/angular-package.yml@main
    with:
      node-version: '24'
      package-manager: pnpm
      build-command: pnpm run build
      run-tests: true
      test-command: pnpm run test:ci
      coverage-format: cobertura
      publish-directory: ./dist/helix
    secrets:
      npm-token: ${{ secrets.GITHUB_TOKEN }}
