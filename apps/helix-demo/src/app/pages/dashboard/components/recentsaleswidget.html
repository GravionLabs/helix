<div class="card">
  <div class="font-semibold text-xl mb-2">Recent Sales</div>
  <h-table [value]="products()" [paginator]="true" [rows]="5" responsiveLayout="scroll">
    <ng-template #header>
      <tr>
        <th>Image</th>
        <th hSortableColumn="name">Name <h-sortIcon field="name"></h-sortIcon></th>
        <th hSortableColumn="price">Price <h-sortIcon field="price"></h-sortIcon></th>
        <th>View</th>
      </tr>
    </ng-template>
    <ng-template #body let-product>
      <tr>
        <td style="width: 15%; min-width: 5rem;">
          <img
            src="https://primefaces.org/cdn/primevue/images/product/{{ product.image }}"
            class="shadow-lg"
            alt="{{ product.name }}"
            width="50"
          />
        </td>
        <td style="width: 35%; min-width: 7rem;">{{ product.name }}</td>
        <td style="width: 35%; min-width: 8rem;">{{ product.price | currency: 'USD' }}</td>
        <td style="width: 15%;">
          <button
            hButton
            hRipple
            type="button"
            icon="pi pi-search"
            class="p-button p-component p-button-text p-button-icon-only"
          ></button>
        </td>
      </tr>
    </ng-template>
  </h-table>
</div>
