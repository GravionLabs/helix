<h-fluid class="grid grid-cols-12 gap-layout">
      <div class="col-span-12 xl:col-span-6">
        <div class="card">
          <div class="font-semibold text-xl mb-3">Linear</div>
          <h-chart type="line" [data]="lineData()" [options]="lineOptions()"></h-chart>
        </div>
      </div>
      <div class="col-span-12 xl:col-span-6">
        <div class="card">
          <div class="font-semibold text-xl mb-3">Bar</div>
          <h-chart type="bar" [data]="barData()" [options]="barOptions()"></h-chart>
        </div>
      </div>
      <div class="col-span-12 xl:col-span-6">
        <div class="card flex flex-col items-center">
          <div class="font-semibold text-xl mb-3">Pie</div>
          <h-chart type="pie" [data]="pieData()" [options]="pieOptions()"></h-chart>
        </div>
      </div>
      <div class="col-span-12 xl:col-span-6">
        <div class="card flex flex-col items-center">
          <div class="font-semibold text-xl mb-3">Doughnut</div>
          <h-chart type="doughnut" [data]="pieData()" [options]="pieOptions()"></h-chart>
        </div>
      </div>
      <div class="col-span-12 xl:col-span-6">
        <div class="card flex flex-col items-center">
          <div class="font-semibold text-xl mb-3">Polar Area</div>
          <h-chart type="polarArea" [data]="polarData()" [options]="polarOptions()"></h-chart>
        </div>
      </div>
      <div class="col-span-12 xl:col-span-6">
        <div class="card flex flex-col items-center">
          <div class="font-semibold text-xl mb-3">Radar</div>
          <h-chart type="radar" [data]="radarData()" [options]="radarOptions()"></h-chart>
        </div>
      </div>
    </h-fluid>
