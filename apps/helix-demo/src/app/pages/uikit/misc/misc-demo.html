<div class="card">
      <div class="font-semibold text-xl mb-2">ProgressBar</div>
      <div class="flex flex-col md:flex-row gap-3">
        <div class="md:w-1/2">
          <h-progressbar [value]="value" [showValue]="true"></h-progressbar>
        </div>
        <div class="md:w-1/2">
          <h-progressbar [value]="50" [showValue]="false"></h-progressbar>
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-layout">
    <div class="flex flex-col md:flex-row gap-layout">
      <div class="md:w-1/2 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">Badge</div>
          <div class="flex gap-1">
            <h-badge value="2"></h-badge>
            <h-badge value="8" severity="success"></h-badge>
            <h-badge value="4" severity="info"></h-badge>
            <h-badge value="12" severity="warn"></h-badge>
            <h-badge value="3" severity="danger"></h-badge>
          </div>

          <div class="font-semibold my-4">Overlay</div>
          <div class="flex gap-3">
            <h-overlaybadge value="2">
              <i class="pi pi-bell" style="font-size: 2rem"></i>
            </h-overlaybadge>
            <h-overlaybadge value="4" severity="danger">
              <i class="pi pi-calendar" style="font-size: 2rem"></i>
            </h-overlaybadge>
            <h-overlaybadge severity="danger">
              <i class="pi pi-envelope" style="font-size: 2rem"></i>
            </h-overlaybadge>
          </div>

          <div class="font-semibold my-4">Button</div>
          <div class="flex gap-1">
            <h-button label="Emails" badge="8"></h-button>
            <h-button
              label="Messages"
              icon="pi pi-users"
              severity="warn"
              badge="8"
              badgeSeverity="danger"
            ></h-button>
          </div>

          <div class="font-semibold my-4">Sizes</div>
          <div class="flex items-start gap-1">
            <h-badge [value]="2"></h-badge>
            <h-badge [value]="4" badgeSize="large" severity="warn"></h-badge>
            <h-badge [value]="6" badgeSize="xlarge" severity="success"></h-badge>
          </div>
        </div>
      </div>
      <div class="md:w-1/2 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">Tag</div>
          <div class="font-semibold mb-2">Default</div>
          <div class="flex gap-1">
            <h-tag value="Primary"></h-tag>
            <h-tag severity="success" value="Success"></h-tag>
            <h-tag severity="info" value="Info"></h-tag>
            <h-tag severity="warn" value="Warning"></h-tag>
            <h-tag severity="danger" value="Danger"></h-tag>
          </div>

          <div class="font-semibold my-4">Pills</div>
          <div class="flex gap-1">
            <h-tag value="Primary" [rounded]="true"></h-tag>
            <h-tag severity="success" value="Success" [rounded]="true"></h-tag>
            <h-tag severity="info" value="Info" [rounded]="true"></h-tag>
            <h-tag severity="warn" value="Warning" [rounded]="true"></h-tag>
            <h-tag severity="danger" value="Danger" [rounded]="true"></h-tag>
          </div>

          <div class="font-semibold my-4">Icons</div>
          <div class="flex gap-1">
            <h-tag icon="pi pi-user" value="Primary"></h-tag>
            <h-tag icon="pi pi-check" severity="success" value="Success"></h-tag>
            <h-tag icon="pi pi-info-circle" severity="info" value="Info"></h-tag>
            <h-tag icon="pi pi-exclamation-triangle" severity="warn" value="Warning"></h-tag>
            <h-tag icon="pi pi-times" severity="danger" value="Danger"></h-tag>
          </div>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-layout">
      <div class="md:w-1/2 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">Avatar</div>
          <div class="font-semibold mb-2">Group</div>
          <h-avatargroup styleClass="mb-2">
            <h-avatar
              image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png"
              size="large"
              shape="circle"
            ></h-avatar>
            <h-avatar
              image="https://primefaces.org/cdn/primeng/images/demo/avatar/asiyajavayant.png"
              size="large"
              shape="circle"
            ></h-avatar>
            <h-avatar
              image="https://primefaces.org/cdn/primeng/images/demo/avatar/onyamalimba.png"
              size="large"
              shape="circle"
            ></h-avatar>
            <h-avatar
              image="https://primefaces.org/cdn/primeng/images/demo/avatar/ionibowcher.png"
              size="large"
              shape="circle"
            ></h-avatar>
            <h-avatar
              image="https://primefaces.org/cdn/primeng/images/demo/avatar/xuxuefeng.png"
              size="large"
              shape="circle"
            ></h-avatar>
            <h-avatar
              label="+2"
              shape="circle"
              size="large"
              [style]="{ 'background-color': '#9c27b0', color: '#ffffff' }"
            ></h-avatar>
          </h-avatargroup>

          <div class="font-semibold my-4">Label - Circle</div>
          <h-avatar class="mr-2" label="P" size="xlarge" shape="circle"></h-avatar>
          <h-avatar
            class="mr-2"
            label="V"
            size="large"
            [style]="{ 'background-color': '#2196F3', color: '#ffffff' }"
            shape="circle"
          ></h-avatar>
          <h-avatar
            class="mr-2"
            label="U"
            [style]="{ 'background-color': '#9c27b0', color: '#ffffff' }"
            shape="circle"
          ></h-avatar>

          <div class="font-semibold my-4">Icon - Badge</div>
          <h-overlaybadge value="4" severity="danger" class="inline-flex">
            <h-avatar label="U" size="xlarge" />
          </h-overlaybadge>
        </div>
      </div>
      <div class="md:w-1/2 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">Chip</div>
          <div class="font-semibold mb-2">Basic</div>
          <div class="flex items-center flex-col sm:flex-row">
            <h-chip label="Action" styleClass="m-1"></h-chip>
            <h-chip label="Comedy" styleClass="m-1"></h-chip>
            <h-chip label="Mystery" styleClass="m-1"></h-chip>
            <h-chip label="Thriller" styleClass="m-1" [removable]="true"></h-chip>
          </div>

          <div class="font-semibold my-4">Icon</div>
          <div class="flex items-center flex-col sm:flex-row">
            <h-chip label="Apple" icon="pi pi-apple" styleClass="m-1"></h-chip>
            <h-chip label="Facebook" icon="pi pi-facebook" styleClass="m-1"></h-chip>
            <h-chip label="Google" icon="pi pi-google" styleClass="m-1"></h-chip>
            <h-chip
              label="Microsoft"
              icon="pi pi-microsoft"
              styleClass="m-1"
              [removable]="true"
            ></h-chip>
          </div>

          <div class="font-semibold my-4">Image</div>
          <div class="flex items-center flex-col sm:flex-row">
            <h-chip
              label="Amy Elsner"
              image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png"
              styleClass="m-1"
            ></h-chip>
            <h-chip
              label="Asiya Javayant"
              image="https://primefaces.org/cdn/primeng/images/demo/avatar/asiyajavayant.png"
              styleClass="m-1"
            ></h-chip>
            <h-chip
              label="Onyama Limba"
              image="https://primefaces.org/cdn/primeng/images/demo/avatar/onyamalimba.png"
              styleClass="m-1"
            ></h-chip>
            <h-chip
              label="Xuxue Feng"
              image="https://primefaces.org/cdn/primeng/images/demo/avatar/xuxuefeng.png"
              styleClass="m-1"
              [removable]="true"
            ></h-chip>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="font-semibold text-xl mb-2">Skeleton</div>
      <div class="rounded-border border border-surface p-6">
        <div class="flex mb-2">
          <h-skeleton shape="circle" size="4rem" styleClass="mr-2"></h-skeleton>
          <div>
            <h-skeleton width="10rem" styleClass="mb-1"></h-skeleton>
            <h-skeleton width="5rem" styleClass="mb-1"></h-skeleton>
            <h-skeleton height=".5rem"></h-skeleton>
          </div>
        </div>
        <h-skeleton width="100%" height="150px"></h-skeleton>
        <div class="flex justify-between mt-1">
          <h-skeleton width="4rem" height="2rem"></h-skeleton>
          <h-skeleton width="4rem" height="2rem"></h-skeleton>
        </div>
      </div>
    </div>
    </div>
