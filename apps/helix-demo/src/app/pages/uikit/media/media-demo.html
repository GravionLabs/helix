<div class="card">
      <div class="font-semibold text-xl mb-2">Carousel</div>
      <h-carousel
        [value]="products()"
        [numVisible]="3"
        [numScroll]="3"
        [circular]="false"
        [responsiveOptions]="carouselResponsiveOptions"
      >
        <ng-template let-product #item>
          <div class="border border-surface rounded-border m-2 p-4">
            <div class="mb-2">
              <div class="relative mx-auto">
                <img
                  src="https://primefaces.org/cdn/primeng/images/demo/product/{{ product.image }}"
                  [alt]="product.name"
                  class="w-full rounded-border"
                />
                <div
                  class="absolute bg-black/70 rounded-border"
                  [ngStyle]="{ 'left.px': 5, 'top.px': 5 }"
                >
                  <h-tag
                    [value]="product.inventoryStatus"
                    [severity]="getSeverity(product.inventoryStatus)"
                  />
                </div>
              </div>
            </div>
            <div class="mb-2 font-medium">{{ product.name }}</div>
            <div class="flex justify-between items-center">
              <div class="mt-0 font-semibold text-xl">{{ '$' + product.price }}</div>
              <span>
                <h-button icon="pi pi-heart" severity="secondary" [outlined]="true" />
                <h-button icon="pi pi-shopping-cart" styleClass="ml-2" />
              </span>
            </div>
          </div>
        </ng-template>
      </h-carousel>
    </div>

    <div class="card">
      <div class="font-semibold text-xl mb-2">Image</div>
      <h-image
        src="https://primefaces.org/cdn/primeng/images/galleria/galleria10.jpg"
        alt="Image"
        width="250"
      />
    </div>

    <div class="card">
      <div class="font-semibold text-xl mb-2">Galleria</div>
      <h-galleria
        [value]="images()"
        [responsiveOptions]="galleriaResponsiveOptions"
        [containerStyle]="{ 'max-width': '640px' }"
        [numVisible]="5"
      >
        <ng-template #item let-item>
          <img [src]="item.itemImageSrc" style="width:100%" />
        </ng-template>
        <ng-template #thumbnail let-item>
          <img [src]="item.thumbnailImageSrc" />
        </ng-template>
      </h-galleria>
    </div>
