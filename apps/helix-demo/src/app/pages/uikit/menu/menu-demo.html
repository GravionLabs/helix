<div class="flex flex-col gap-layout">
    <div class="flex flex-col gap-1">
      <div class="card">
        <div class="font-semibold text-xl mb-2">Menubar</div>
        <h-menubar [model]="nestedMenuItems">
          <ng-template #end>
            <h-iconfield>
              <h-inputicon class="pi pi-search" />
              <input type="text" hInputText placeholder="Search" />
            </h-iconfield>
          </ng-template>
        </h-menubar>
      </div>

      <div class="card">
        <div class="font-semibold text-xl mb-2">Breadcrumb</div>
        <h-breadcrumb [model]="breadcrumbItems" [home]="breadcrumbHome"></h-breadcrumb>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-layout">
      <div class="md:w-1/2 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">Steps</div>
          <h-stepper [value]="1">
            <h-step-list>
              <h-step [value]="1">Header I</h-step>
              <h-step [value]="2">Header II</h-step>
              <h-step [value]="3">Header III</h-step>
            </h-step-list>
          </h-stepper>
        </div>
      </div>
      <div class="md:w-1/2 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">TabMenu</div>
          <h-tabs [value]="0">
            <h-tablist>
              <h-tab [value]="0">Header I</h-tab>
              <h-tab [value]="1">Header II</h-tab>
              <h-tab [value]="2">Header III</h-tab>
            </h-tablist>
          </h-tabs>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-layout">
      <div class="md:w-1/3 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">Tiered Menu</div>
          <h-tieredmenu [model]="tieredMenuItems"></h-tieredmenu>
        </div>
      </div>
      <div class="md:w-1/3 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">Plain Menu</div>
          <h-menu [model]="menuItems"></h-menu>
        </div>
      </div>
      <div class="md:w-1/3 flex flex-col">
        <div class="card">
          <div class="font-semibold text-xl mb-2">Overlay Menu</div>
          <h-menu #menu [popup]="true" [model]="overlayMenuItems"></h-menu>
          <button
            type="button"
            hButton
            icon="pi pi-chevron-down"
            label="Options"
            (click)="menu.toggle($event)"
            style="width:auto"
          ></button>
        </div>

        <div class="card" #anchor>
          <div class="font-semibold text-xl mb-2">Context Menu</div>
          Right click to display.
          <h-contextmenu [target]="anchor" [model]="contextMenuItems"></h-contextmenu>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-layout">
      <div class="md:w-1/2 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">MegaMenu | Horizontal</div>
          <h-megamenu [model]="megaMenuItems" />

          <div class="font-semibold text-xl mb-2 mt-2">MegaMenu | Vertical</div>
          <h-megamenu [model]="megaMenuItems" orientation="vertical" />
        </div>
      </div>
      <div class="md:w-1/2 flex flex-col">
        <div class="card h-full">
          <div class="font-semibold text-xl mb-2">PanelMenu</div>
          <h-panelmenu [model]="panelMenuItems" />
        </div>
      </div>
    </div>
  </div>
