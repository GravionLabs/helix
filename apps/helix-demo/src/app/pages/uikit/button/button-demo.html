<div class="flex flex-col md:flex-row gap-layout">
    <div class="md:w-1/2 flex flex-col">
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Default</div>
        <div class="flex flex-wrap gap-1">
          <h-button label="Submit"></h-button>
          <h-button label="Disabled" [disabled]="true"></h-button>
          <h-button label="Link" class="p-button-link" />
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Severities</div>
        <div class="flex flex-wrap gap-1">
          <h-button label="Primary" />
          <h-button label="Secondary" severity="secondary" />
          <h-button label="Success" severity="success" />
          <h-button label="Info" severity="info" />
          <h-button label="Warn" severity="warn" />
          <h-button label="Help" severity="help" />
          <h-button label="Danger" severity="danger" />
          <h-button label="Contrast" severity="contrast" />
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Text</div>
        <div class="flex flex-wrap gap-1">
          <h-button label="Primary" text />
          <h-button label="Secondary" severity="secondary" text />
          <h-button label="Success" severity="success" text />
          <h-button label="Info" severity="info" text />
          <h-button label="Warn" severity="warn" text />
          <h-button label="Help" severity="help" text />
          <h-button label="Danger" severity="danger" text />
          <h-button label="Plain" text />
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Outlined</div>
        <div class="flex flex-wrap gap-1">
          <h-button label="Primary" outlined />
          <h-button label="Secondary" severity="secondary" outlined />
          <h-button label="Success" severity="success" outlined />
          <h-button label="Info" severity="info" outlined />
          <h-button label="warn" severity="warn" outlined />
          <h-button label="Help" severity="help" outlined />
          <h-button label="Danger" severity="danger" outlined />
          <h-button label="Contrast" severity="contrast" outlined />
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Group</div>
        <div class="flex flex-wrap gap-1">
          <h-buttongroup>
            <h-button label="Save" icon="pi pi-check" />
            <h-button label="Delete" icon="pi pi-trash" />
            <h-button label="Cancel" icon="pi pi-times" />
          </h-buttongroup>
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">SplitButton</div>
        <div class="flex flex-wrap gap-1">
          <h-splitbutton label="Save" [model]="items"></h-splitbutton>
          <h-splitbutton label="Save" [model]="items" severity="secondary"></h-splitbutton>
          <h-splitbutton label="Save" [model]="items" severity="success"></h-splitbutton>
          <h-splitbutton label="Save" [model]="items" severity="info"></h-splitbutton>
          <h-splitbutton label="Save" [model]="items" severity="warn"></h-splitbutton>
          <h-splitbutton label="Save" [model]="items" severity="help"></h-splitbutton>
          <h-splitbutton label="Save" [model]="items" severity="danger"></h-splitbutton>
          <h-splitbutton label="Save" [model]="items" severity="contrast"></h-splitbutton>
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Templating</div>
        <div class="flex flex-wrap gap-1">
          <h-button type="button">
            <img
              alt="logo"
              src="https://primefaces.org/cdn/primeng/images/logo.svg"
              style="width: 1.5rem"
            />
          </h-button>
          <h-button type="button" outlined severity="success">
            <img
              alt="logo"
              src="https://primefaces.org/cdn/primeng/images/logo.svg"
              style="width: 1.5rem"
            />
            <span class="text-bold">Helix</span>
          </h-button>
        </div>
      </div>
    </div>
    <div class="md:w-1/2 flex flex-col">
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Icons</div>
        <div class="flex flex-wrap gap-1">
          <h-button icon="pi pi-bookmark"></h-button>
          <h-button label="Bookmark" icon="pi pi-bookmark"></h-button>
          <h-button label="Bookmark" icon="pi pi-bookmark" iconPos="right"></h-button>
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Raised</div>
        <div class="flex flex-wrap gap-1">
          <h-button label="Primary" raised />
          <h-button label="Secondary" severity="secondary" raised />
          <h-button label="Success" severity="success" raised />
          <h-button label="Info" severity="info" raised />
          <h-button label="Warn" severity="warn" raised />
          <h-button label="Help" severity="help" raised />
          <h-button label="Danger" severity="danger" raised />
          <h-button label="Contrast" severity="contrast" raised />
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Rounded</div>
        <div class="flex flex-wrap gap-1">
          <h-button label="Primary" rounded />
          <h-button label="Secondary" severity="secondary" rounded />
          <h-button label="Success" severity="success" rounded />
          <h-button label="Info" severity="info" rounded />
          <h-button label="Warn" severity="warn" rounded />
          <h-button label="Help" severity="help" rounded />
          <h-button label="Danger" severity="danger" rounded />
          <h-button label="Contrast" severity="contrast" rounded />
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Rounded Icons</div>
        <div class="flex flex-wrap gap-1">
          <h-button icon="pi pi-check" rounded />
          <h-button icon="pi pi-bookmark" severity="secondary" rounded />
          <h-button icon="pi pi-search" severity="success" rounded />
          <h-button icon="pi pi-user" severity="info" rounded />
          <h-button icon="pi pi-bell" severity="warn" rounded />
          <h-button icon="pi pi-heart" severity="help" rounded />
          <h-button icon="pi pi-times" severity="danger" rounded />
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Rounded Text</div>
        <div class="flex flex-wrap gap-1">
          <h-button icon="pi pi-check" text raised rounded />
          <h-button icon="pi pi-bookmark" severity="secondary" text raised rounded />
          <h-button icon="pi pi-search" severity="success" text raised rounded />
          <h-button icon="pi pi-user" severity="info" text raised rounded />
          <h-button icon="pi pi-bell" severity="warn" text raised rounded />
          <h-button icon="pi pi-heart" severity="help" text raised rounded />
          <h-button icon="pi pi-times" severity="danger" text raised rounded />
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Rounded Outlined</div>
        <div class="flex flex-wrap gap-1">
          <h-button icon="pi pi-check" rounded outlined />
          <h-button icon="pi pi-bookmark" severity="secondary" rounded outlined />
          <h-button icon="pi pi-search" severity="success" rounded outlined />
          <h-button icon="pi pi-user" severity="info" rounded outlined />
          <h-button icon="pi pi-bell" severity="warn" rounded outlined />
          <h-button icon="pi pi-heart" severity="help" rounded outlined />
          <h-button icon="pi pi-times" severity="danger" rounded outlined />
        </div>
      </div>
      <div class="card flex flex-col gap-3">
        <div class="font-semibold text-xl">Loading</div>
        <div class="flex flex-wrap gap-1">
          <h-button
            type="button"
            label="Search"
            icon="pi pi-search"
            [loading]="loading[0]"
            (click)="load(0)"
          />
          <h-button
            type="button"
            label="Search"
            icon="pi pi-search"
            iconPos="right"
            [loading]="loading[1]"
            (click)="load(1)"
          />
          <h-button
            type="button"
            styleClass="h-full"
            icon="pi pi-search"
            [loading]="loading[2]"
            (click)="load(2)"
          />
          <h-button type="button" label="Search" [loading]="loading[3]" (click)="load(3)" />
        </div>
      </div>
    </div>
  </div>
