<h-fluid>
    <div class="flex flex-col gap-layout">
    <div class="flex flex-col md:flex-row gap-layout">
      <div class="md:w-1/2 flex flex-col">
        <div class="card flex flex-col gap-3 h-full">
          <div class="font-semibold text-xl">Vertical</div>
          <div class="flex flex-col gap-1">
            <label for="name1">Name</label>
            <input hInputText id="name1" type="text" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="email1">Email</label>
            <input hInputText id="email1" type="text" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="age1">Age</label>
            <input hInputText id="age1" type="text" />
          </div>
        </div>
      </div>
      <div class="md:w-1/2 flex flex-col">
        <div class="card flex flex-col gap-3 h-full">
          <div class="font-semibold text-xl">Horizontal</div>
          <div class="grid grid-cols-12 gap-1">
            <label for="name3" class="flex items-center col-span-12 mb-1 md:col-span-2 md:mb-0">Name</label>
            <div class="col-span-12 md:col-span-10">
              <input hInputText id="name3" type="text" />
            </div>
          </div>
          <div class="grid grid-cols-12 gap-1">
            <label for="email3" class="flex items-center col-span-12 mb-1 md:col-span-2 md:mb-0">Email</label>
            <div class="col-span-12 md:col-span-10">
              <input hInputText id="email3" type="text" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-layout">
      <div class="md:w-1/2 flex flex-col">
        <div class="card flex flex-col gap-3 h-full">
          <div class="font-semibold text-xl">Vertical Grid</div>
          <div class="flex flex-wrap gap-3">
            <div class="flex flex-col grow basis-0 gap-1">
              <label for="name2">Name</label>
              <input hInputText id="name2" type="text" />
            </div>
            <div class="flex flex-col grow basis-0 gap-1">
              <label for="email2">Email</label>
              <input hInputText id="email2" type="text" />
            </div>
          </div>
        </div>
      </div>
      <div class="md:w-1/2 flex flex-col">
        <div class="card flex flex-col gap-3 h-full">
          <div class="font-semibold text-xl">Inline</div>
          <div class="flex flex-wrap items-start gap-3">
            <div class="field">
              <label for="firstname1" class="sr-only">Firstname</label>
              <input hInputText id="firstname1" type="text" placeholder="Firstname" />
            </div>
            <div class="field">
              <label for="lastname1" class="sr-only">Lastname</label>
              <input hInputText id="lastname1" type="text" placeholder="Lastname" />
            </div>
            <h-button label="Submit" [fluid]="false"></h-button>
          </div>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-layout">
      <div class="md:w-1/2 flex flex-col">
        <div class="card flex flex-col gap-3 h-full">
          <div class="font-semibold text-xl">Help Text</div>
          <div class="flex flex-wrap gap-1">
            <label for="username">Username</label>
            <input hInputText id="username" type="text" />
            <small>Enter your username to reset your password.</small>
          </div>
        </div>
      </div>
      <div class="md:w-1/2 flex flex-col">
        <div class="card flex flex-col gap-3 h-full">
          <div class="font-semibold text-xl">Advanced</div>
        <div class="flex flex-col md:flex-row gap-3">
          <div class="flex flex-wrap gap-1 w-full">
            <label for="firstname2">Firstname</label>
            <input hInputText id="firstname2" type="text" />
          </div>
          <div class="flex flex-wrap gap-1 w-full">
            <label for="lastname2">Lastname</label>
            <input hInputText id="lastname2" type="text" />
          </div>
        </div>

        <div class="flex flex-wrap">
          <label for="address">Address</label>
          <textarea hTextarea id="address" rows="4"></textarea>
        </div>

        <div class="flex flex-col md:flex-row gap-3">
          <div class="flex flex-wrap gap-1 w-full">
            <label for="state">State</label>
            <h-select
              id="state"
              [(ngModel)]="dropdownItem"
              [options]="dropdownItems"
              optionLabel="name"
              placeholder="Select One"
              class="w-full"
            ></h-select>
          </div>
          <div class="flex flex-wrap gap-1 w-full">
            <label for="zip">Zip</label>
            <input hInputText id="zip" type="text" />
          </div>
        </div>
      </div>
      </div>
    </div>
  </div>
  </h-fluid>
