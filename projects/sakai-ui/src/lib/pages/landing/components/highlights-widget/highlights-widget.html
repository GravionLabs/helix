<div id="highlights" class="py-6 px-6 lg:px-20 mx-0 my-12 lg:mx-20">
  <div class="text-center">
    <div class="text-surface-900 dark:text-surface-0 font-normal mb-2 text-4xl">
      {{ sectionTitle() }}
    </div>
    <span class="text-muted-color text-2xl">{{ sectionSubtitle() }}</span>
  </div>

  @for (highlight of highlights(); track highlight.title; let i = $index) {
    <div
      class="grid grid-cols-12 gap-4 mt-20"
      [class.pb-2]="i === 0"
      [class.md:pb-20]="i === 0"
      [class.pt-2]="i > 0"
      [class.md:pt-20]="i > 0"
    >
      @if (highlight.imageAlign === 'left') {
        <div
          class="flex justify-center col-span-12 lg:col-span-6 p-0 order-1 lg:order-0"
          [ngClass]="highlight.imageBgClass"
          style="border-radius: 8px"
        >
          <img [src]="highlight.imageUrl" class="w-11/12" [alt]="highlight.imageAlt" />
        </div>
        <div
          class="col-span-12 lg:col-span-6 my-auto flex flex-col lg:items-end text-center lg:text-right gap-4"
        >
          <div
            class="flex items-center justify-center self-center lg:self-end"
            [ngClass]="highlight.iconBgClass"
            style="width: 4.2rem; height: 4.2rem; border-radius: 10px"
          >
            <i [ngClass]="[highlight.icon, 'text-4xl!', highlight.iconColorClass]"></i>
          </div>
          <div class="leading-none text-surface-900 dark:text-surface-0 text-3xl font-normal">
            {{ highlight.title }}
          </div>
          <span
            class="text-surface-700 dark:text-surface-100 text-2xl leading-normal ml-0 md:ml-2"
            style="max-width: 650px"
          >
            {{ highlight.description }}
          </span>
        </div>
      } @else {
        <div
          class="col-span-12 lg:col-span-6 my-auto flex flex-col text-center lg:text-left lg:items-start gap-4"
        >
          <div
            class="flex items-center justify-center self-center lg:self-start"
            [ngClass]="highlight.iconBgClass"
            style="width: 4.2rem; height: 4.2rem; border-radius: 10px"
          >
            <i [ngClass]="[highlight.icon, 'text-3xl!', highlight.iconColorClass]"></i>
          </div>
          <div class="leading-none text-surface-900 dark:text-surface-0 text-3xl font-normal">
            {{ highlight.title }}
          </div>
          <span
            class="text-surface-700 dark:text-surface-100 text-2xl leading-normal mr-0 md:mr-2"
            style="max-width: 650px"
          >
            {{ highlight.description }}
          </span>
        </div>
        <div
          class="flex justify-end order-1 sm:order-2 col-span-12 lg:col-span-6 p-0"
          [ngClass]="highlight.imageBgClass"
          style="border-radius: 8px"
        >
          <img [src]="highlight.imageUrl" class="w-11/12" [alt]="highlight.imageAlt" />
        </div>
      }
    </div>
  }
</div>
