<div id="features" class="py-6 px-6 lg:px-20 mt-8 mx-0 lg:mx-20">
  <div class="grid grid-cols-12 gap-4 justify-center">
    <div class="col-span-12 text-center mt-20 mb-6">
      <div class="text-surface-900 dark:text-surface-0 font-normal mb-2 text-4xl">
        {{ sectionTitle() }}
      </div>
      <span class="text-muted-color text-2xl">{{ sectionSubtitle() }}</span>
    </div>

    @for (feature of features(); track feature.title) {
      <div class="col-span-12 md:col-span-12 lg:col-span-4 p-0 lg:p-2 mt-6 lg:mt-0">
        <div style="height: 160px; padding: 2px; border-radius: 10px" [style]="feature.cardStyle">
          <div class="p-4 bg-surface-0 dark:bg-surface-900 h-full" style="border-radius: 8px">
            <div
              class="flex items-center justify-center mb-4"
              [ngClass]="feature.iconBgClass"
              style="width: 3.5rem; height: 3.5rem; border-radius: 10px"
            >
              <i [ngClass]="[feature.icon, 'text-2xl!', feature.iconColorClass]"></i>
            </div>
            <h5 class="mb-2 text-surface-900 dark:text-surface-0">{{ feature.title }}</h5>
            <span class="text-surface-600 dark:text-surface-200">{{ feature.description }}</span>
          </div>
        </div>
      </div>
    }

    @if (testimonial()) {
      <div
        class="col-span-12 mt-20 mb-20 p-2 md:p-20"
        style="
          border-radius: 20px;
          background:
            linear-gradient(0deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)),
            radial-gradient(77.36% 256.97% at 77.36% 57.52%, #efe1af 0%, #c3dcfa 100%);
        "
      >
        <div class="flex flex-col justify-center items-center text-center px-4 py-4 md:py-0">
          <div class="text-gray-900 mb-2 text-3xl font-semibold">{{ testimonial()!.name }}</div>
          <span class="text-gray-600 text-2xl">{{ testimonial()!.company }}</span>
          <p
            class="text-gray-900 sm:line-height-2 md:line-height-4 text-2xl mt-6"
            style="max-width: 800px"
          >
            {{ testimonial()!.text }}
          </p>
          @if (testimonial()!.logoUrl) {
            <img [src]="testimonial()!.logoUrl" class="mt-6" alt="Company logo" />
          }
        </div>
      </div>
    }
  </div>
</div>
