<div
  class="helix-status-bar"
  [style.height]="height()"
  [style.background-color]="bgColor()"
  [style.color]="textColor()"
>
  <span class="helix-status-bar-brand">{{ brand() }}</span>

  @if (envForBadge(); as env) {
    <helix-environment-badge [environment]="env" />
  }

  @if (note(); as n) {
    <span class="helix-status-bar-note">{{ n }}</span>
  }

  <div class="helix-status-bar-versions">
    @for (ver of versions(); track ver.label) {
      <span class="helix-status-bar-version">
        <span class="helix-status-bar-version-label">{{ ver.label }}:</span>
        <span class="helix-status-bar-version-value">{{ ver.value }}</span>
      </span>
    }
  </div>
</div>
