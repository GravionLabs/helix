<canvas
    role="img"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-labelledby]="ariaLabelledBy()"
    [attr.width]="responsive() && !width() ? null : width()"
    [attr.height]="responsive() && !height() ? null : height()"
    (click)="onCanvasClick($event)"
    [hBind]="ptm('canvas')"
></canvas>
