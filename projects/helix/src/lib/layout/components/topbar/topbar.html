<div class="layout-topbar">
  <div class="layout-topbar-start">
    <button class="layout-menu-button layout-topbar-action" (click)="store.onMenuToggle()">
      <i class="pi pi-bars"></i>
    </button>
    @if (showBreadcrumbs()) {
      <p-breadcrumb [model]="effectiveBreadcrumbs()" [home]="{ icon: 'pi pi-home', routerLink: '/' }" />
    }
  </div>

  <div class="layout-topbar-end">
    <div class="layout-config-menu">
      @for (item of items(); track $index) {
        @switch (item.type) {
          @case ('darkmode') {
            <helix-dark-mode-action />
          }
          @case ('configurator') {
            <helix-configurator-action />
          }
          @case ('alert') {
            <helix-alert-action [count]="item.badgeCount ?? 0" [alerts]="item.alerts" />
          }
          @case ('action') {
            <button type="button" class="layout-topbar-action" (click)="item.command?.()">
              <i [class]="item.icon ?? ''"></i>
            </button>
          }
        }
      }
    </div>

    <button
      class="layout-topbar-menu-button layout-topbar-action"
      pStyleClass="@next"
      enterFromClass="hidden"
      enterActiveClass="animate-scalein"
      leaveToClass="hidden"
      leaveActiveClass="animate-fadeout"
      [hideOnOutsideClick]="true"
    >
      <i class="pi pi-ellipsis-v"></i>
    </button>

    <div class="layout-topbar-menu hidden lg:block">
      <div class="layout-topbar-menu-content">
        @for (action of topbarActions(); track action.icon) {
          <button type="button" class="layout-topbar-action" (click)="action.command?.()">
            <i [class]="action.icon"></i>
            <span>{{ action.label }}</span>
          </button>
        }
        <ng-content select="[helixTopbarEnd]" />
      </div>
    </div>
  </div>
</div>
