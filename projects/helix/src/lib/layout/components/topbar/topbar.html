<div class="layout-topbar">
  <div class="layout-topbar-logo-container">
    <ng-content select="[helixTopbarStart]" />
    <button class="layout-menu-button layout-topbar-action" (click)="store.onMenuToggle()">
      <i class="pi pi-bars"></i>
    </button>
    <a class="layout-topbar-logo" routerLink="/">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m10 16 1.5 1.5" />
        <path d="m14 8-1.5-1.5" />
        <path d="M15 2c-1.798 1.998-2.518 3.995-2.807 5.993" />
        <path d="m16.5 10.5 1 1" />
        <path d="m17 6-2.891-2.891" />
        <path d="M2 15c6.667-6 13.333 0 20-6" />
        <path d="m20 9 .891.891" />
        <path d="M3.109 14.109 4 15" />
        <path d="m6.5 12.5 1 1" />
        <path d="m7 18 2.891 2.891" />
        <path d="M9 22c1.798-1.998 2.518-3.995 2.807-5.993" />
      </svg>
      <span>{{ appTitle() }}</span>
      @if (environment(); as env) {
        <helix-environment-badge [environment]="env" />
      }
    </a>
  </div>

  @if (showBreadcrumbs()) {
    <p-breadcrumb [model]="effectiveBreadcrumbs()" />
  }

  <div class="layout-topbar-actions">
    <div class="layout-config-menu">
      @for (badge of badges(); track $index) {
        @switch (badge.type) {
          @case ('darkmode') {
            <helix-dark-mode-badge />
          }
          @case ('configurator') {
            <helix-configurator-badge />
          }
          @case ('alert') {
            <helix-alert-badge [count]="badge.badgeCount ?? 0" [alerts]="badge.alerts" />
          }
          @case ('action') {
            <button type="button" class="layout-topbar-action" (click)="badge.command?.()">
              <i [class]="badge.icon ?? ''"></i>
            </button>
          }
        }
      }
    </div>

    <button
      class="layout-topbar-menu-button layout-topbar-action"
      pStyleClass="@next"
      enterFromClass="hidden"
      enterActiveClass="animate-scalein"
      leaveToClass="hidden"
      leaveActiveClass="animate-fadeout"
      [hideOnOutsideClick]="true"
    >
      <i class="pi pi-ellipsis-v"></i>
    </button>

    <div class="layout-topbar-menu hidden lg:block">
      <div class="layout-topbar-menu-content">
        @for (action of topbarActions(); track action.icon) {
          <button type="button" class="layout-topbar-action" (click)="action.command?.()">
            <i [class]="action.icon"></i>
            <span>{{ action.label }}</span>
          </button>
        }
        <ng-content select="[helixTopbarEnd]" />
      </div>
    </div>
  </div>
</div>
