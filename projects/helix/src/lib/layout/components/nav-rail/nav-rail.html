<aside class="helix-nav-rail" [class.helix-nav-rail-collapsed]="store.isCollapsed()">
  <div class="helix-nav-rail-brand">
    <a routerLink="/" class="helix-nav-rail-brand-link">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="var(--helix-nav-accent)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="helix-nav-rail-brand-mark"
      >
        <path d="m10 16 1.5 1.5" />
        <path d="m14 8-1.5-1.5" />
        <path d="M15 2c-1.798 1.998-2.518 3.995-2.807 5.993" />
        <path d="m16.5 10.5 1 1" />
        <path d="m17 6-2.891-2.891" />
        <path d="M2 15c6.667-6 13.333 0 20-6" />
        <path d="m20 9 .891.891" />
        <path d="M3.109 14.109 4 15" />
        <path d="m6.5 12.5 1 1" />
        <path d="m7 18 2.891 2.891" />
        <path d="M9 22c1.798-1.998 2.518-3.995 2.807-5.993" />
      </svg>
      @if (!store.isCollapsed()) {
        <span class="helix-nav-rail-brand-word">{{ appTitle() }}</span>
      }
    </a>
  </div>

  <nav class="helix-nav-rail-nav">
    @for (group of model(); track group.section ?? $index) {
      <div class="helix-nav-rail-group">
        @if (group.section && !store.isCollapsed()) {
          <div class="helix-nav-rail-section">{{ group.section }}</div>
        }
        @if (group.section && store.isCollapsed() && $index > 0) {
          <div class="helix-nav-rail-divider"></div>
        }
        <ul class="helix-nav-rail-list">
          @for (item of group.items; track item.label) {
            <li helix-nav-rail-item [item]="item" [parentPath]="null" [depth]="0"></li>
          }
        </ul>
      </div>
    }
  </nav>

  <button
    type="button"
    class="helix-nav-rail-collapse-button"
    (click)="store.toggleSidebar()"
    [title]="store.isCollapsed() ? 'Expand navigation' : 'Collapse navigation'"
  >
    <i
      class="pi"
      [ngClass]="{
        'pi-angle-double-left': !store.isCollapsed(),
        'pi-angle-double-right': store.isCollapsed(),
      }"
    ></i>
    @if (!store.isCollapsed()) {
      <span>Collapse</span>
    }
  </button>
</aside>
