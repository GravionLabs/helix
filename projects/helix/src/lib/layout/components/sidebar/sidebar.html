<div
  class="layout-sidebar"
  [ngClass]="{ 'layout-sidebar-collapsed': store.isCollapsed() }"
>
  <helix-menu [model]="menu()"></helix-menu>
  <button
    type="button"
    class="layout-sidebar-collapse-button"
    (click)="store.toggleSidebar()"
    [title]="store.isCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
  >
    <i
      [ngClass]="{
        'pi': true,
        'pi-angle-double-left': !store.isCollapsed(),
        'pi-angle-double-right': store.isCollapsed()
      }"
    ></i>
  </button>
</div>
