<div class="layout-wrapper" [ngClass]="containerClass()">
  <helix-topbar
    [items]="effectiveItems()"
    [topbarActions]="effectiveTopbarActions()"
  ></helix-topbar>
  <helix-nav-rail
    [model]="effectiveNavGroups()"
    [appTitle]="appTitle()"
    [brandIcon]="brandIcon()"
  ></helix-nav-rail>
  <div class="layout-main-container">
    <div class="layout-main">
      <router-outlet></router-outlet>
    </div>
  </div>
  <helix-status-bar
    [brand]="statusBarBrand()"
    [environment]="statusBarEnvironment()"
    [note]="statusBarNote()"
    [tone]="statusBarTone()"
    [versions]="statusBarVersions()"
  />
  <div class="layout-mask"></div>
</div>
