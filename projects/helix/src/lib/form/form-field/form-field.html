<div class="helix-form-field">
  @if (showLabel() && label()) {
    <label class="helix-form-field__label">{{ label() }}</label>
  }

  <div class="helix-form-field__control">
    <ng-content />
  </div>

  @if (showHint()) {
    @if (activeError(); as err) {
      <small class="helix-form-field__message helix-form-field__message--error p-error">{{ err }}</small>
    } @else if (hint()) {
      <small class="helix-form-field__message helix-form-field__message--hint">{{ hint() }}</small>
    }
  }
</div>
