<div #container [hBind]="ptm('root')" [class]="cn(cx('root'), className())" [style]="style()" [ngStyle]="sx('root')">
  @if (!buttonTemplate() && !_buttonTemplate) {
    <button
      type="button"
      hButton
      hRipple
      [style]="buttonStyle()"
      [icon]="buttonIconClass"
      [class]="cn(cx('pcButton'), buttonClassName())"
      [disabled]="disabled()"
      [attr.aria-expanded]="visible()"
      [attr.aria-haspopup]="true"
      [attr.aria-controls]="$id() + '_list'"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-labelledby]="ariaLabelledBy()"
      (click)="onButtonClick($event)"
      (keydown)="onTogglerKeydown($event)"
      [buttonProps]="buttonProps()"
      [pt]="ptm('pcButton')"
      [unstyled]="unstyled()"
      >
      @if (!buttonIconClass && !iconTemplate() && !_iconTemplate) {
        <svg data-p-icon="plus" hButtonIcon [pt]="ptm('pcButton')['icon']" />
      }
      <ng-container *ngTemplateOutlet="iconTemplate() || _iconTemplate"></ng-container>
    </button>
  }
  @if (buttonTemplate() || _buttonTemplate) {
    <ng-container *ngTemplateOutlet="buttonTemplate() || _buttonTemplate; context: { toggleCallback: onButtonClick.bind(this) }"></ng-container>
  }
  <ul
    #list
    [hBind]="ptm('list')"
    [class]="cx('list')"
    role="menu"
    [id]="$id() + '_list'"
    (focus)="onFocus($event)"
    (focusout)="onBlur($event)"
    (keydown)="onKeyDown($event)"
    [attr.aria-activedescendant]="focused ? focusedOptionId : undefined"
    [tabindex]="-1"
    [ngStyle]="sx('list')"
    >
    @for (item of model(); track item; let i = $index) {
      <li
        [hBind]="getPTOptions($id() + '_' + i, 'item')"
        [ngStyle]="getItemStyle(i)"
        [class]="cx('item', { item, i })"
        hTooltip
        [pTooltipUnstyled]="unstyled()"
        [tooltipOptions]="item.tooltipOptions || getTooltipOptions(item)"
        [id]="$id() + '_' + i"
        [attr.aria-controls]="$id() + '_item'"
        role="menuitem"
        [attr.data-p-active]="isItemActive($id() + '_' + i)"
        >
        @if (itemTemplate() || _itemTemplate) {
          <ng-container *ngTemplateOutlet="itemTemplate() || _itemTemplate; context: { $implicit: item, index: i, toggleCallback: onItemClick.bind(this) }"></ng-container>
        }
        @if (!itemTemplate() && !_itemTemplate) {
          <button
            type="button"
            hButton
            hRipple
            [class]="cx('pcAction')"
            severity="secondary"
            [rounded]="true"
            size="small"
            role="menuitem"
            (click)="onItemClick($event, item)"
            [disabled]="$safeNavigationMigration(item?.disabled)"
            (keydown.enter)="onItemClick($event, item)"
            [attr.aria-label]="item.label"
            [attr.tabindex]="item.disabled || !visible() ? null : item.tabindex ? item.tabindex : '0'"
            [pt]="getPTOptions($id() + '_' + i, 'pcAction')"
            [unstyled]="unstyled()"
            >
            @if (item.icon) {
              <span hButtonIcon [pt]="getPTOptions($id() + '_' + i, 'actionIcon')" [class]="item.icon"></span>
            }
          </button>
        }
      </li>
    }
  </ul>
</div>
@if (mask() && visible()) {
  <div [hBind]="ptm('mask')" [class]="cn(cx('mask'), maskClassName())" [ngStyle]="maskStyle()" animate.enter="p-overlay-mask-enter-active" animate.leave="p-overlay-mask-leave-active"></div>
}
